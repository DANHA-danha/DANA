<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .letter { fill: #001489; font-family: Arial, Helvetica, sans-serif; font-weight: 800; font-size: 72px; }
    </style>
  </defs>
  <!-- N -->
  <text class="letter" x="10" y="75">N</text>
